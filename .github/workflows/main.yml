name: Build & publish VT index & manifest

on:
  release:
    types:
      - published
      - prereleased
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to process (leave empty = latest release)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  vt-index:
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
      API: https://api.github.com/repos/${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: true
          path: repo

      - name: Install jq & curl
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Resolve release (tag + id)
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REL_ID: ${{ github.event.release.id }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            REL_ID="$EVENT_REL_ID"
            TAG="$EVENT_TAG"
            echo "Source: release event"
          elif [ -n "${INPUT_TAG:-}" ]; then
            echo "Source: workflow_dispatch with tag=$INPUT_TAG"
            TAG="$INPUT_TAG"
            REL_JSON=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$API/releases/tags/$TAG")
            REL_ID=$(echo "$REL_JSON" | jq -r .id)
          else
            echo "Source: workflow_dispatch — fetching latest release"
            REL_JSON=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$API/releases/latest")
            TAG=$(echo "$REL_JSON" | jq -r .tag_name)
            REL_ID=$(echo "$REL_JSON" | jq -r .id)
          fi
          if [ -z "$REL_ID" ] || [ -z "$TAG" ] || [ "$REL_ID" = "null" ] || [ "$TAG" = "null" ]; then
            echo "ERROR: Could not resolve release. EVENT_NAME=$EVENT_NAME REL_ID='$REL_ID' TAG='$TAG'"
            exit 1
          fi
          echo "Resolved: REL_ID=$REL_ID TAG=$TAG"
          echo "REL_ID=$REL_ID" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Download release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dl
          curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "${API}/releases/${REL_ID}" > release.json
          jq '[ .assets[] | select(.name != "vt-index.json") | select((.name | test("\\.(blockmap|yml)$")) | not) | { name: .name, url: .browser_download_url, size: .size, content_type: .content_type, updated_at: .updated_at } ]' \
            release.json > assets_raw.json
          jq -r '.[] | "\(.name)\t\(.url)"' assets_raw.json | while IFS=$'\t' read -r NAME URL; do
            curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -o "dl/${NAME}" "$URL"
          done

      - name: Generate vt-index.json
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const crypto = require('crypto');
          const { execSync } = require('child_process');
          const dir = 'dl';
          const VT = process.env.VT_API_KEY || '';
          const out = {};

          if (!VT) {
            console.log('WARN: VT_API_KEY is not set — only sha256 will be written, no VirusTotal lookup/upload.');
          }

          function sleep(ms) {
            try { execSync(`sleep ${Math.ceil(ms / 1000)}`); } catch {}
          }

          function errInfo(e) {
            const code = (e && typeof e.status === 'number') ? `exit=${e.status}` : 'exit=?';
            const stderr = (e && e.stderr) ? e.stderr.toString().trim() : '';
            return stderr ? `${code} stderr=${stderr}` : code;
          }

          function order(name) {
            const n = name.toLowerCase();
            if (/win|\.exe$/.test(n)) return 0;
            if (/mac|darwin|\.dmg$|\.pkg$/.test(n)) return 1;
            if (/linux|\.deb$|\.appimage$|\.tar\.gz$/.test(n)) return 2;
            return 3;
          }

          function vtQuery(sha) {
            if (!VT) return null;
            try {
              const r = execSync(`curl -fsS -H "x-apikey: ${VT}" -H "accept: application/json" "https://www.virustotal.com/api/v3/files/${sha}"`);
              return JSON.parse(r.toString());
            } catch {
              return null;
            }
          }

          function vtGetUploadUrl() {
            try {
              const r = execSync(`curl -fsS -H "x-apikey: ${VT}" -H "accept: application/json" "https://www.virustotal.com/api/v3/files/upload_url"`);
              const js = JSON.parse(r.toString());
              return js && js.data ? js.data : null;
            } catch (e) {
              console.log(`  upload_url error: ${errInfo(e)}`);
              return null;
            }
          }

          function vtUpload(fp) {
            if (!VT) return null;
            const stat = fs.statSync(fp);
            const sizeMB = (stat.size / (1024 * 1024)).toFixed(1);
            let endpoint = 'https://www.virustotal.com/api/v3/files';

            if (stat.size > 650 * 1024 * 1024) {
              console.log(`  skip upload: size ${sizeMB} MB > 650 MB (VT public API limit)`);
              return null;
            }

            if (stat.size > 32 * 1024 * 1024) {
              console.log(`  size ${sizeMB} MB > 32 MB — requesting upload_url`);
              endpoint = vtGetUploadUrl();
              if (!endpoint) {
                console.log(`  failed to obtain upload_url`);
                return null;
              }
            } else {
              console.log(`  size ${sizeMB} MB — direct upload`);
            }

            try {
              const r = execSync(
                `curl -fsS -H "x-apikey: ${VT}" -H "accept: application/json" -F "file=@${fp}" "${endpoint}"`,
                { maxBuffer: 64 * 1024 * 1024 }
              );
              return JSON.parse(r.toString());
            } catch (e) {
              console.log(`  upload error: ${errInfo(e)}`);
              return null;
            }
          }

          function pollAnalysis(id) {
            if (!VT || !id) return false;
            for (let i = 0; i < 30; i++) {
              try {
                const r = execSync(`curl -fsS -H "x-apikey: ${VT}" -H "accept: application/json" "https://www.virustotal.com/api/v3/analyses/${id}"`);
                const js = JSON.parse(r.toString());
                const st = js && js.data && js.data.attributes ? js.data.attributes.status : 'unknown';
                console.log(`  poll ${i + 1}/30: ${st}`);
                if (st === 'completed') return true;
              } catch (e) {
                console.log(`  poll ${i + 1}/30: error ${errInfo(e)}`);
              }
              if (i < 29) sleep(30000);
            }
            console.log(`  poll timeout after 15 min`);
            return false;
          }

          const names = fs.readdirSync(dir)
            .filter(n => fs.statSync(dir + '/' + n).isFile())
            .sort((a, b) => order(a) - order(b) || a.localeCompare(b));

          console.log(`Processing ${names.length} file(s) in order:`);
          for (const n of names) console.log(`  - ${n}`);

          for (const name of names) {
            const path = dir + '/' + name;
            console.log(`\n=== ${name} ===`);
            const buf = fs.readFileSync(path);
            const sha = crypto.createHash('sha256').update(buf).digest('hex');
            console.log(`  sha256: ${sha}`);
            let vtUrl = null;

            if (vtQuery(sha)) {
              console.log(`  found existing report on VT`);
              vtUrl = `https://www.virustotal.com/gui/file/${sha}`;
            } else if (VT) {
              console.log(`  no existing report — uploading`);
              const up = vtUpload(path);
              const id = up && up.data ? up.data.id : null;
              if (id) {
                console.log(`  analysis id: ${id}`);
                const ok = pollAnalysis(id);
                if (ok && vtQuery(sha)) {
                  vtUrl = `https://www.virustotal.com/gui/file/${sha}`;
                } else if (ok) {
                  console.log(`  analysis completed but vtQuery returned null (indexing delay?)`);
                }
              } else {
                console.log(`  no analysis id returned`);
              }
            }

            out[name] = { sha256: sha };
            if (vtUrl) {
              out[name].vt = vtUrl;
              console.log(`  vt: ${vtUrl}`);
            } else {
              console.log(`  vt: (none)`);
            }
          }

          fs.writeFileSync('vt-index.json', JSON.stringify(out, null, 2));
          console.log(`\nWrote vt-index.json with ${Object.keys(out).length} entries`);
          NODE

      - name: Generate manifest (releases_latest.json)
        shell: bash
        run: |
          set -euo pipefail
          jq -s '
            (.[0]) as $assets
            | (.[1] | to_entries) as $vt
            | $assets
            | map(. + {
                sha256: ($vt | map(select(.key == .name))[0].value.sha256 // empty),
                vt:     ($vt | map(select(.key == .name))[0].value.vt     // empty)
              })
          ' assets_raw.json vt-index.json > releases_latest.json
          mkdir -p repo/public/vt repo/public/releases
          cp vt-index.json repo/public/vt/${TAG}.json
          cp vt-index.json repo/public/vt/latest.json
          cp releases_latest.json repo/public/releases/latest.json

      - name: Commit & push
        shell: bash
        run: |
          set -euo pipefail
          cd repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public/vt public/releases
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "VT index & manifest ${TAG}"
          git push origin HEAD:${{ github.event.repository.default_branch }} --force
